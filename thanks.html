<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Wayterra — Grazie per il tuo acquisto!">
<title>Wayterra — Benvenuto!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --w:#fff;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;
  --g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g700:#374151;--g900:#111827;
  --orange:#e8721a;--orange-l:#fde8d8;
  --f:'Geist',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--f);background:var(--w);color:var(--g900);min-height:100vh;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{display:flex;align-items:center;gap:9px;}
.nav-name{font-size:.95rem;font-weight:800;color:var(--g900);letter-spacing:-.03em;}

/* MAIN */
.main{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.card{max-width:480px;width:100%;text-align:center;}
.icon-wrap{width:80px;height:80px;border-radius:50%;background:var(--orange-l);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;}
.icon-wrap i{font-size:2rem;color:var(--orange);}
.title{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-bottom:16px;color:var(--g900);}
.subtitle{font-size:.98rem;color:var(--g500);line-height:1.75;margin-bottom:32px;max-width:380px;margin-left:auto;margin-right:auto;}
.cta-btn{display:inline-flex;align-items:center;gap:8px;padding:15px 36px;background:var(--orange);color:#fff;border-radius:100px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(232,114,26,.35);transition:all .15s;border:none;font-family:var(--f);}
.cta-btn:hover{background:#d4641a;transform:translateY(-1px);}
.foot-note{margin-top:16px;font-size:.75rem;color:var(--g400);}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg width="30" height="30" viewBox="0 0 200 200" fill="none">
      <circle cx="100" cy="100" r="88" stroke="#2d5a27" stroke-width="10" fill="none"/>
      <polygon points="100,8 107,32 100,26 93,32" fill="#e8721a"/>
      <polygon points="100,192 107,168 100,174 93,168" fill="#2d5a27"/>
      <polygon points="192,100 168,107 174,100 168,93" fill="#2d5a27"/>
      <polygon points="8,100 32,107 26,100 32,93" fill="#2d5a27"/>
      <path d="M58 75 L100 68 L142 75 L142 138 L100 145 L58 138 Z" fill="#e8e0b8" stroke="#2d5a27" stroke-width="4" stroke-linejoin="round"/>
      <line x1="100" y1="68" x2="100" y2="145" stroke="#2d5a27" stroke-width="2.5" stroke-dasharray="4 3"/>
      <ellipse cx="76" cy="118" rx="14" ry="8" fill="#5a9e50" opacity=".7"/>
      <circle cx="72" cy="128" r="3.5" fill="#e8721a"/>
      <circle cx="115" cy="98" r="3" fill="#e8721a" opacity=".8"/>
      <polygon points="128,90 120,96 124,104 136,94" fill="#e8721a"/>
    </svg>
    <span class="nav-name">Wayterra</span>
  </div>
</nav>

<main class="main">
  <div class="card">
    <div class="icon-wrap">
      <i class="ti ti-compass"></i>
    </div>
    <h1 class="title" id="title">Benvenuto nell'avventura! 🎉</h1>
    <p class="subtitle" id="subtitle">Grazie per aver scelto Wayterra. Hai appena sbloccato l'accesso completo a tutti i luoghi nascosti del Lazio. Ora tocca a te esplorarli.</p>
    <a class="cta-btn" href="app.html" id="cta">Inizia ad esplorare →</a>
    <p class="foot-note" id="footnote">Il tuo accesso è stato salvato su questo dispositivo.</p>
  </div>
</main>

<script>
localStorage.setItem('WT_UNLOCKED', '1');

var lang = localStorage.getItem('WT_LANG_v1') || 'en';
if (lang === 'en') {
  document.getElementById('title').textContent = 'Welcome to the adventure! 🎉';
  document.getElementById('subtitle').textContent = "Thank you for choosing Wayterra. You've just unlocked full access to all hidden places in Lazio. Now it's your turn to explore them.";
  document.getElementById('cta').textContent = 'Start exploring →';
  document.getElementById('footnote').textContent = 'Your access has been saved on this device.';
}
</script>
</body>
</html>
